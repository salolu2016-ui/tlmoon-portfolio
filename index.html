<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Moon | Technology Solutions Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --accent-purple: #bf5af2;
            --accent-blue: #0a84ff;
            --text-main: #f5f5f7;
            --text-dim: #a1a1a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            position: absolute;
            width: 100%;
            z-index: 1000;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--accent-blue);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .nav-links a:hover { opacity: 0.7; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at 50% 40%, rgba(191, 90, 242, 0.15) 0%, transparent 60%);
        }

        /* Contenedor del logo con el brillo púrpura de la imagen */
        .hero-logo-container {
            width: 180px;
            height: 180px;
            margin-bottom: 2.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 24px;
            /* Brillo suave alrededor de la imagen */
            box-shadow: 0 0 50px rgba(191, 90, 242, 0.5);
        }

        .hero-title {
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.2rem;
            color: white;
        }

        .hero-title span {
            display: block;
            background: linear-gradient(90deg, #bf5af2, #0a84ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-dim);
            max-width: 650px;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .btn-main {
            background: linear-gradient(90deg, #bf5af2, #0a84ff);
            color: white;
            padding: 1.1rem 2.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(10, 132, 255, 0.3);
        }

        /* --- SECCIONES SIGUIENTES --- */
        section { padding: 8rem 10%; }
        h2 { font-size: 2.5rem; margin-bottom: 3rem; text-align: center; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            section { padding: 4rem 5%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">TL MOON</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <header class="hero" id="home">
        <div class="hero-logo-container">
            <img src="logo.jpg" alt="TL Moon Logo">
        </div>
        
        <h1 class="hero-title">
            Technology Solutions
            <span>with Strategy & Precision</span>
        </h1>
        
        <p class="hero-subtitle">I help businesses turn complex technology into simple, practical solutions.</p>
        
        <a href="#contact" class="btn-main">Start your project</a>
    </header>

    </body>
</html>
