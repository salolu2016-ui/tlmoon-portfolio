<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL Moon | Technology Solutions Consulting</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #05070a;
    --card-bg: #0d1117;
    --accent-purple: #bf5af2;
    --accent-blue: #0a84ff;
    --text-main: #f5f5f7;
    --text-dim: #a1a1a6;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-color);
    color: var(--text-main);
    overflow-x: hidden;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 10%;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(5,7,10,0.7);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

.logo {
    font-weight: 700;
    font-size: 1.4rem;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-links a {
    color: var(--text-main);
    text-decoration: none;
    margin-left: 2rem;
    font-size: 0.95rem;
    opacity: 0.8;
    position: relative;
    transition: 0.3s;
}

.nav-links a:visited {
    color: var(--text-main);
}

.nav-links a:hover {
    opacity: 1;
}

.nav-links a::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 0;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

/* HERO */
header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 10%;
    position: relative;
    overflow: hidden;
}

/* Fondo glow */
header::before {
    content: "";
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(191, 90, 242, 0.25), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(120px);
    z-index: -1;
}

/* LOGO */
.hero-logo {
    width: 140px;
    height: 140px;
    border-radius: 30px;
    background: radial-gradient(circle at 30% 30%, #1a1a2e, #0d1117);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    position: relative;
    box-shadow:
        0 0 60px rgba(191, 90, 242, 0.35),
        inset 0 0 20px rgba(255,255,255,0.05);
}

.hero-logo::before {
    content: "";
    position: absolute;
    width: 180%;
    height: 180%;
    background: radial-gradient(circle, rgba(191, 90, 242, 0.25), transparent 70%);
    z-index: -1;
}

.hero-logo::after {
    content: "";
    position: absolute;
    width: 90px;
    height: 90px;
    border: 2px solid rgba(138, 92, 246, 0.6);
    border-radius: 50%;
    transform: rotate(25deg);
}

.hero-logo span {
    font-weight: 700;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* TITULO */
.hero-title {
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 1.5rem;
}

.hero-title span {
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SUB */
.hero-subtitle {
    font-size: 1.1rem;
    color: var(--text-dim);
    max-width: 600px;
    margin-bottom: 2.5rem;
}

/* BOTON */
.btn {
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    padding: 1rem 2.5rem;
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 5px 20px rgba(191, 90, 242, 0.3);
}

.btn:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 15px 40px rgba(191, 90, 242, 0.5);
}

/* Sections */
section {
    padding: 8rem 10%;
}

h2 {
    font-size: 2.5rem;
    margin-bottom: 3rem;
    text-align: center;
}

/* Responsive */
@media (max-width: 768px) {
    .nav-links { display: none; }
}
</style>
</head>

<body>

<nav>
    <div class="logo">TL MOON</div>
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<header id="home">
    <div class="hero-logo">
        <span>TL</span>
    </div>

    <h1 class="hero-title">
        Technology Solutions <br>
        <span>with Strategy & Precision</span>
    </h1>

    <p class="hero-subtitle">
        I help businesses turn complex technology into simple, practical solutions.
    </p>

    <a href="mailto:salolu2016@gmail.com" class="btn">
        Start your project
    </a>
</header>

</body>
</html>
